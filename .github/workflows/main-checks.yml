name: Main Checks

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-and-test:
    runs-on: windows-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Setup project environment
        run: .\scripts\setup_windows.ps1

      - name: Compile core modules
        run: .\.venv\Scripts\python.exe -m py_compile bot.py karten.py

      - name: Validate card data
        run: .\.venv\Scripts\python.exe .\scripts\validate_cards.py

      - name: Run test suite
        run: .\scripts\run_tests.ps1
